<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIP39 Phrase Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 style="text-align: center;">BIP39 Phrase generator</h1>
    <br/>

    <div id="settings">
        <select id="phrase-size">
            <option value="128">12</option>
            <option value="160">15</option>
            <option value="192">18</option>
            <option value="224">21</option>
            <option value="256">24</option>
        </select>
        <select id="languages">
            <option value="english">English</option>
            <option value="japanese">日本語</option>
            <option value="spanish">Español</option>
            <option value="simplifiedChinese">中文(简体)</option>
            <option value="traditionalChinese">中文(繁體)</option>
            <option value="french">Français</option>
            <option value="italian">Italiano</option>
            <option value="korean">한국어</option>
            <option value="czech">Čeština</option>
            <option value="portuguese">Português</option>
        </select>
        <button id="generate-btn">Generate</button>
    </div>

    <div id="main">
        <div class="key">Mnemonic</div>
        <div class="value" id="mnemonic">-</div>

        <div class="key">Bitcoin Address (m/84'/0'/0'/0/0)</div>
        <div class="value" id="bitcoinAddress">-</div>

        <div class="key">Ethereum Address (m/44'/60'/0'/0/0)</div>
        <div class="value" id="ethereumAddress">-</div>

        <div class="key">Solana Address (m/44'/60'/0'/0/0)</div>
        <div class="value" id="solanaAddress">-</div>
    </div> 
    

    <script src="script.js"></script>
</body>
</html>
